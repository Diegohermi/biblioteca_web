<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>
  <form action="/dashboard">
    <label>Correo:</label>
    <input type="email" name="correo" required>
    <label>Contraseña:</label>
    <input type="password" name="contraseña" required>
    <button type="submit">Entrar</button>
  </form>
</body>
</html>
